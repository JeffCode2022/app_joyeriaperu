name: luxe_joyas
description: "Premium jewelry e-commerce mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Persistence
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI / Design
  google_fonts: ^6.2.1
  iconsax_flutter: ^1.0.0+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flutter_staggered_grid_view: ^0.7.0

  # Utils
  intl: ^0.20.0
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
